<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VelkTrade Redirect</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || "";
        var hash = window.location.hash || "";

        var roomMatch = path.match(/(?:\/VelkTrade)?\/room\/([^\/?#]+)/i);
        var userMatch = path.match(/(?:\/VelkTrade)?\/user\/([^\/?#]+)/i);

        var roomId = roomMatch && roomMatch[1] ? decodeURIComponent(roomMatch[1]) : "";
        var username = userMatch && userMatch[1] ? decodeURIComponent(userMatch[1]) : "";

        var base = path.indexOf("/VelkTrade/") === 0 || path === "/VelkTrade"
          ? "/VelkTrade/"
          : "/";

        var target = window.location.origin + base;

        if (roomId) {
          target += "?room=" + encodeURIComponent(roomId);
        } else if (username) {
          target += "?user=" + encodeURIComponent(username);
        } else if (search) {
          target += search.replace(/^\?/, "?");
        }

        target += hash;

        window.location.replace(target);
      })();
    </script>

    <p>Redirecting to VelkTrade...</p>
  </body>
</html>
